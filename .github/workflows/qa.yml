name: Update QA Philosophy

on:
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Debug files
        run: ls -la

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run script
        run: node update-qa.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "update QA philosophy" || echo "no changes"
          git push
